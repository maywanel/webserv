server {
    listen 8002;
    listen 8003;
	server_name localhost;
   # host 127.0.0.1;
    root www/fusion_web/;
    client_max_body_size 17179184M;
	index index.html;
    error_page 403 error_pages/403.html;
    error_page 404 error_pages/404.html;
    error_page 500 error_pages/500.html;


    location / {
        allow_methods  DELETE POST GET;
        upload_dir uploads/;
        autoindex on;
    }
}
