server {
    listen 0.0.0.0:80;
    server_name example.com www.example.com;
    host 127.0.0.1;
    root /var/www/html;
    index start.html home.html;
    error_page 404 /404.html;
    error_page 500 /500.html;
    client_max_body_size 1024000;

    location / {
        root /var/www/html/public;
        autoindex off;
        allow_methods GET;
        index default.html;
    }

    location /redirect {
        return 301 /new-location;
    }

    location /cgi-bin {
        cgi_ext .py .php;
        cgi_path /usr/bin/python3 /usr/bin/php;
        allow_methods GET POST;
    }
}

server {
    listen 80;
    host 127.0.0.1;
    root /var/www/server1;
}