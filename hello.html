<!DOCTYPE html>
<html>
<head>
    <title>Hello Page</title>
    <style>
        body {
            background-color: lightblue;
            text-align: center;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: darkblue;
            border-bottom: 2px solid darkblue;
            padding-bottom: 10px;
        }
        p {
            color: gray;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hello World!</h1>
    <p>Welcome to my first webpage with a custom design.</p>
</div>

</body>
</html>
